<div class="stress">
  <div class="top">
    <div class="title">Stress level</div>
    <div
      class="label"
      [class.high]="clamped >= 45"
      [class.mod]="clamped >= 20 && clamped < 45"
    >
      {{ label }}
    </div>
  </div>

  <div
    class="bar"
    role="progressbar"
    [attr.aria-valuenow]="value ?? 0"
    aria-valuemin="0"
    aria-valuemax="100"
  >
    <div
      class="marker"
      [style.left.%]="markerLeftPct"
      [class.hidden]="value === null"
    >
      <div class="arrow"></div>
      <div class="markerValue">{{ clamped | number:'1.0-0' }}</div>
    </div>

    <div class="ticks">
      <div class="tick" *ngFor="let t of limits" [style.left.%]="t.pct">
        <div class="tickLine"></div>
        <div class="tickLabel">{{ t.label }}</div>
      </div>
    </div>

    <div class="track">
      <div
        class="fill"
        [style.width.%]="clamped"
        [style.background]="fillColor"
      ></div>
    </div>

    <div class="ends">
      <span>Low</span>
      <span>High</span>
    </div>
  </div>
</div>
